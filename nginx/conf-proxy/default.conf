server {
  listen 80;
  server_name koston.top www.koston.top;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name koston.top www.koston.top;

  # 证书与私钥路径
  ssl_certificate /etc/nginx/ssl/cert.pem;
  ssl_certificate_key /etc/nginx/ssl/cert.key;

  # 如果 .pem 文件不包含根证书，可能需要指定中间证书链[reference:12]
  # ssl_trusted_certificate /path/to/ca-bundle.crt;

  # 安全增强配置
  ssl_protocols TLSv1.2 TLSv1.3;                  # 仅启用安全的 TLS 协议版本[reference:13]
  ssl_ciphers HIGH:!aNULL:!MD5;                   # 使用强加密套件[reference:14]
  ssl_prefer_server_ciphers on;                   # 优先使用服务器端定义的加密套件[reference:15]

  # 会话缓存优化性能
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  location / {
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    client_max_body_size 100M;
    # docker default host machine ip
    proxy_pass http://172.17.0.1:6080;
  }
}

