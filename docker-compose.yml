
version: '3.3'

services:
  mongo:
    image: mongodb/mongodb-community-server:latest
    volumes:
      - ./store/configdb:/data/configdb
      - ./store/db:/data/db
    env_file:
      - .env
    ports:
      - "27018:27017"
    user: root
  payload:
    build: ./payload
    ports:
      - "6300:3000"
    volumes:
      - ./payload/upload:/app/upload
    environment:
      DATABASE_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@172.17.0.1:27018/${MONGO_DBNAME}?authSource=admin"
      PAYLOAD_SECRET: "${PAYLOAD_SECRET}"
      IN_DOCKER: 1
  website:
    build: ./
    ports:
      - "6321:4321"
    volumes:
      - astro-static:/app/dist/client
    environment:
      DATABASE_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@172.17.0.1:27018/${MONGO_DBNAME}?authSource=admin"
      PAYLOAD_SECRET: "${PAYLOAD_SECRET}"
      IN_DOCKER: 1
  web:
    image: nginx:stable-alpine3.23-perl
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - astro-static:/app/astro
      - ./payload/upload:/app/upload
    ports:
      - '6080:80'
  web-proxy:
    image: nginx:stable-alpine3.23-perl
    volumes:
      - ./nginx/conf-proxy:/etc/nginx/conf.d
      - /opt/ssl:/etc/nginx/ssl
    ports:
      - '80:80'
      - '443:443'
volumes:
  astro-static:
